<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پلیر آوا و نوا | نغمه قلم</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== ریست و فونت ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #030710;
            background-image: radial-gradient(circle at 50% 50%, #091224 0%, #030710 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: "B Nazanin", "B Lotus", "Tanha", sans-serif;
            padding: 0;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== شمسه پس‌زمینه ===== */
        .shamseh-bg {
            position: absolute;
            width: 100%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 1 / 1;
            background-image: url('Eslimi_Design_Surah.svg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            pointer-events: none;
            filter: invert(1) sepia(1) saturate(7) hue-rotate(5deg) brightness(0.9) opacity(0.35);
            transform-origin: center center;
            animation: slowRotate 140s linear infinite;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes slowRotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* ===== هدر ===== */
        .luxury-islamic-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 160px;
            overflow: hidden;
            z-index: 99;
            pointer-events: none;
        }
        .gold-wave-stripes,
        .navy-wave-body {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .gold-wave-stripes svg,
        .navy-wave-body svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .gold-wave-stripes svg {
            filter: drop-shadow(0px 4px 8px rgba(212, 175, 55, 0.4));
        }

        /* ===== دکمه بازگشت ===== */
        .subpage-back-zone {
            position: absolute;
            top: 30px;
            left: 25px;
            z-index: 9999;
        }
        .btn-mini {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
            font-size: 0.99rem;
        }
        .btn-mini:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: #d4af37;
        }

        /* ===== برند ===== */
        .subpage-brand {
            position: absolute;
            top: 15px;
            right: 35px;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .subpage-brand h2 {
            font-size: 1.8rem;
            color: #d4af37;
            margin: 0;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }
        .subpage-brand span {
            font-size: 1rem;
            color: #a0aec0;
        }

        .subpage-shamseh {
            width: 45px;
            height: 45px;
            background-image: url('8.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(0) saturate(100%) invert(68%) sepia(85%) saturate(950%) hue-rotate(354deg) brightness(95%) contrast(90%);
            animation: eslimiMiniRotate 12s linear infinite;
        }
        @keyframes eslimiMiniRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== کارت پلیر ===== */
        .card {
            background-color: #070f1e;
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(212, 175, 55, 0.2);
            width: 100%;
            max-width: 520px;
            text-align: center;
            border: 2px solid #d4af37;
            position: relative;
            z-index: 5;
            box-sizing: border-box;
            margin-top: 180px;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 16px;
            pointer-events: none;
        }

        .quote-icon {
            font-size: 50px;
            color: #d4af37;
            font-family: Georgia, serif;
            line-height: 0;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        /* ===== گرامافون ===== */
        .gramophone {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 15px auto;
        }
        .vinyl-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a2a2a, #0a0a0a 70%, #1a1a1a 100%);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2), 0 0 0 6px #0a0a0a, 0 0 0 8px rgba(212, 175, 55, 0.15);
            position: relative;
        }
        .vinyl-disc.spinning {
            animation: spinVinyl 2.5s linear infinite;
        }
        @keyframes spinVinyl {
            100% {
                transform: rotate(360deg);
            }
        }

        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #d4af37, #b8960f);
            border: 2px solid #f1ebd9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
            color: #030710;
            text-align: center;
            padding: 4px;
            box-sizing: border-box;
        }
        .vinyl-label .label-title {
            font-size: 0.6rem;
            font-weight: bold;
            color: #1a1a1a;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .vinyl-label .label-sub {
            font-size: 0.5rem;
            color: #333;
            margin-top: 2px;
        }
        .vinyl-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #030710;
            z-index: 6;
        }

        /* ===== بازو ===== */
        .tone-arm {
            position: absolute;
            top: -20px;
            right: -45px;
            width: 90px;
            height: 90px;
            z-index: 10;
            pointer-events: none;
            transform-origin: top right;
            transform: rotate(-16deg);
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .tone-arm.active {
            transform: rotate(4deg);
        }
        .tone-arm svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.5));
        }

        /* ===== متن‌ها ===== */
        .track-title {
            font-size: 1.5rem;
            color: #f1ebd9;
            font-weight: bold;
            margin: 8px 0 2px;
        }
        .track-artist {
            font-size: 1rem;
            color: #a0aec0;
            margin-bottom: 22px;
        }

        /* ============================================
           دکمه‌های کنترل مدرن و لوکس (بدون دایره)
           ============================================ */
.audio-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-bottom:22px;

    direction:ltr; /* مهم */
}

        .control-btn {
            background: transparent;
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .control-btn svg {
    width:22px;
    height:22px;
            fill: #a0aec0;
            transition: all 0.3s;
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.1));
        }

        /* هُور (Glow) زیر دکمه‌ها */
        .control-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .control-btn:hover {
            transform: translateY(-3px);
        }

.play-main:hover{
      transform: translateY(-2px);  /* تغییر از -4px به -2px */
    box-shadow:
        0 4px 12px rgba(212,175,55,.15),  /* کاهش از .25 به .15 */
        0 0 20px rgba(212,175,55,.08);      /* کاهش از .3 به .15 */
}

.play-main:hover svg{
    fill:#091224;
}

        .control-btn:hover::after {
            width: 80%;
        }

        .control-btn:active svg {
            transform: scale(0.85);
        }

        /* دکمه اصلی پخش (بزرگ‌تر و خاص) */
.play-main{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
        linear-gradient(145deg,#d4af37,#f5d76e);

    box-shadow:
        0 6px 15px rgba(212,175,55,.2),   /* کاهش از .35 به .2 */
        0 0 20px rgba(212,175,55,.1);     /* کاهش از .18 به .1 */

    transition:all .35s ease;

    position:relative;
    overflow:hidden;
}

.play-main::before{
    content:'';
    position:absolute;
    inset:-40%;
    background:
        linear-gradient(
            120deg,
            transparent,
            rgba(255,255,255,.35),
            transparent
        );

    transform:translateX(-120%) rotate(20deg);
    transition:.8s;
}

.play-main:hover::before{
    transform:translateX(120%) rotate(20deg);
}

.play-main:hover{
    transform:translateY(-4px);

.play-main:hover::after{
    border-color: rgba(237, 209, 115, 0.15);  /* کمی پررنگ‌تر در هاور */
    animation-duration: 2s;  /* تندتر شدن انیمیشن در هاور */
}
}

.play-main:active{
    transform:scale(.95);
}

.play-main svg{
    fill:#091224;
}
.play-main svg{
    width:25px !important;
    height:25px !important;
     shape-rendering: geometricPrecision;
}

        /* دکمه‌های کناری (قبلی/بعدی) با طراحی مینیمال */
.side-btn{
    width:52px;
    height:52px;

    border-radius:16px;

    background:
        rgba(255,255,255,.03);

    border:1px solid rgba(212,175,55,.15);

    backdrop-filter:blur(10px);

    transition:all .3s ease;
}

.side-btn svg{
    width:24px;
    height:24px;

    fill:#d4af37;
}

.side-btn:hover{
    transform:translateY(-3px);

    background:
        rgba(212,175,55,.08);

    border-color:
        rgba(212,175,55,.6);

    box-shadow:
        0 0 25px rgba(212,175,55,.15);
}

.side-btn:active{
    transform:scale(.92);
}
.play-main::after{
    content:'';
    position:absolute;
    inset:-1px;  /* تغییر از -2px یا -3px به -1px */
    border-radius:50%;
    border:1px solid rgba(212,175,55,.12);  /* تغییر از .2 به .12 و ضخامت از 1.5 به 1 */
    animation:pulseRing 3s infinite;  /* تغییر از 2.5s به 3s برای کندتر */
}


@keyframes pulseRing{
    0%{
        transform:scale(1);
        opacity:.3;  /* تغییر از .4 به .3 */
    }
    100%{
        transform:scale(1.08);  /* تغییر از 1.15 به 1.08 */
        opacity:0;
    }
}

        /* ===== نوار پیشرفت ===== */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #a0aec0;
            font-size: 0.8rem;
            width: 100%;
        }
        .progress-bar {
            flex-grow: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d4af37;
        }

        /* ===== باکس متن آهنگ ===== */
        .lyrics-box {
            margin-top: 18px;
            padding-top: 16px;
            border-top: 1px solid rgba(212, 175, 55, 0.12);
            font-size: 1.15rem;
            line-height: 2;
            color: #f1ebd9;
            max-height: 180px;
            overflow-y: auto;
            text-align: center;
        }
        .lyrics-box::-webkit-scrollbar {
            width: 3px;
        }
        .lyrics-box::-webkit-scrollbar-thumb {
            background: #d4af37;
        }

        /* ===== واکنش‌گرایی ===== */
        @media (max-width: 580px) {
            .card {
                margin-top: 140px;
                padding: 20px 15px;
            }
            .gramophone {
                width: 170px;
                height: 170px;
            }
            .subpage-brand h2 {
                font-size: 1.3rem;
            }
            .subpage-brand span {
                display: none;
            }
            .control-btn {
                padding: 8px 10px;
            }
            .control-btn svg {
                width: 18px;
                height: 18px;
            }
            
            .play-main {
                padding: 12px 18px;
            }
            .play-main svg {
                width: 26px;
                height: 26px;
            }
            .control-btn.side-btn svg {
                width: 17px;
                height: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="shamseh-bg"></div>

    <div class="luxury-islamic-header">
        <div class="gold-wave-stripes">
            <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
                <path d="M0,120 C320,180 480,40 800,130 C1120,220 1280,70 1440,110 L1440,0 L0,0 Z" fill="rgba(214, 175, 55, 0.4)"></path>
                <path d="M0,110 C300,170 500,50 820,120 C1140,190 1260,80 1440,95 L1440,0 L0,0 Z" fill="#d4af37"></path>
            </svg>
        </div>
        <div class="navy-wave-body">
            <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
                <path d="M0,100 C280,160 520,60 840,110 C1160,160 1240,90 1440,80 L1440,0 L0,0 Z" fill="#040914"></path>
            </svg>
        </div>
    </div>

    <div class="subpage-back-zone">
        <button class="btn-mini" onclick="exitPlayer()">بازگشت به کتابخانه</button>
    </div>

    <div class="subpage-brand">
        <div class="subpage-shamseh"></div>
        <h2>آوا و نوا</h2>
        <span>| نغمه قلم </span>
    </div>

    <div class="card">
        <div class="quote-icon">❝</div>

        <div class="gramophone">
            <div id="vinyl-disc" class="vinyl-disc">
                <div class="vinyl-label">
                    <span id="label-title" class="label-title">نغمه قلم</span>
                    <span id="label-artist" class="label-sub">آوا</span>
                </div>
                <div class="vinyl-hole"></div>
            </div>

            <div id="tone-arm" class="tone-arm">
                <svg viewBox="0 0 100 100" fill="none">
                    <circle cx="85" cy="15" r="8" fill="#b8960f" stroke="#d4af37" stroke-width="1.5"/>
                    <path d="M80 20 L20 60" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="20" cy="60" r="4" fill="#d4af37" stroke="#f1ebd9" stroke-width="1"/>
                </svg>
            </div>
        </div>

        <div id="track-name" class="track-title">بارگذاری...</div>
        <div id="track-singer" class="track-artist">خواننده</div>

        <!-- دکمه‌های کنترل مدرن -->
        <div class="audio-controls">
            <!-- قبلی -->
            <button class="control-btn side-btn" onclick="playPrevious()" title="آوای قبلی">
                <svg viewBox="0 0 24 24">
                    <path d="M6 6h2v12H6V6zm3.5 6l8.5 6V6l-8.5 6z"/>
                </svg>
            </button>

            <!-- پخش/توقف -->
            <button id="play-btn" class="control-btn play-main" onclick="toggleAudio()">
                <svg viewBox="0 0 24 24">
    <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
</svg>
            </button>

            <!-- بعدی -->
            <button class="control-btn side-btn" onclick="playNext()" title="آوای بعدی">
                <svg viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zm9-12h2v12h-2V6z"/>
                </svg>
            </button>
        </div>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
            <span id="duration-time">0:00</span>
        </div>

        <div id="lyrics-content" class="lyrics-box">
            در حال دریافت تکست آوا...
        </div>
    </div>

    <script src="player.js"></script>
</body>
</html>
