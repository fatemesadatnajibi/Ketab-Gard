<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت ابری | نغمه قلم</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            display: block !important;
            overflow-y: auto !important;
            padding: 40px 10px !important;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .admin-form {
            background-color: #070f1e;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #d4af37;
            width: 95%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            font-family: "B Nazanin", "Tanha", sans-serif;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 20px; text-align: right; }
        .form-group label { display: block; margin-bottom: 8px; color: #d4af37; font-size: 1.2rem; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; background-color: #030710; border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 8px; color: #f1ebd9; font-family: inherit; font-size: 1.1rem; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div style="margin-top: -20px; margin-bottom: 30px; width: 100%; padding: 0 20px; box-sizing: border-box; display: flex; justify-content: flex-start; align-items: center; direction: rtl;">
    <div id="auth-user" style="display: none; align-items: center; margin-right: auto;">
        <span id="admin-username" style="color: #cbd5e0; margin-left: 10px; font-size: 1.05rem;"></span>
        <button class="btn btn-secondary style-mini" onclick="logoutAdmin()" style="margin: 0 !important;">خروج</button>
    </div>
</div>
    <div class="admin-form">
        <h2 style="text-align: center; color: #d4af37; margin-bottom: 25px; font-size: 1.8rem;">ارسال مستقیم شاهکار به سرور ابری</h2>
        
        <div class="form-group">
            <label for="quoteText">متن شعر یا سخن (با دکمه Enter به خط بعد بروید):</label>
            <textarea id="quoteText" rows="4" placeholder="گر ز می افشان کنی زلف چلیپا را ز هم..."></textarea>
        </div>

        <div class="form-group">
            <label for="quoteSource">صاحب اثر (شاعر/نویسنده):</label>
            <input type="text" id="quoteSource" placeholder="حافظ شیرازی">
        </div>

        <div class="form-group">
            <label for="quoteGenre">ژانر / دسته‌بندی:</label>
            <select id="quoteGenre">
                <option value="عاشقانه">عاشقانه</option>
                <option value="عرفانی">عرفانی</option>
                <option value="فلسفی">فلسفی</option>
                <option value="حکمت">پند و حکمت</option>
                <option value="اجتماعی">اجتماعی</option>
                <option value="طنز">طنز و انتقادی</option>
                <option value="مذهبی">مذهبی</option>
                <option value="حماسی">حماسی</option>
                <option value="ادبیات جهان">ادبیات جهان</option>

            </select>
        </div>

        <div class="form-group">
            <label for="quoteInfo">توضیحات و تفسیر پشت اثر:</label>
            <textarea id="quoteInfo" rows="3" placeholder="توضیحاتی درباره این بیت..."></textarea>
        </div>

        <div class="form-group">
            <label for="quoteLink">لینک منبع:</label>
            <input type="url" id="quoteLink" placeholder="https://ganjoor.net/...">
        </div>

        <button class="btn" style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1.4rem; display: block;" onclick="sendToCloud()">ثبت در پایگاه داده</button>
    </div>

<script>
    const SUPABASE_URL = 'https://shnuggkkwvyixdmlnugl.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Lih64HUZIiKkxniY28yOPA_NL7Hz7km';
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 📌 لایه امنیتی ۱: به محض ورود به صفحه، دسترسی ادمین بررسی می‌شود
    // 📌 لایه امنیتی ۱: بررسی دسترسی ادمین و نمایش شیک نام کاربری
    async function checkAdminAccess() {
        try {
            // در ابتدا کانتینر هدر را مخفی نگه می‌داریم تا دیتای واقعی لود شود
            const authUserContainer = document.getElementById('auth-user');
            if (authUserContainer) authUserContainer.style.display = 'none';

            const { data: { user }, error: userError } = await client.auth.getUser();
            
            // اگر کاربر اصلاً لاگین نکرده باشد
            if (userError || !user) {
                window.location.replace('index.html');
                return;
            }

            // بررسی نقش کاربر از جدول profiles
            const { data: profile, error: profileError } = await client
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .maybeSingle();

            // اگر نقش ادمین نداشت، او را به صفحه اصلی شوت کن
            if (profileError || !profile || profile.role !== 'admin') {
                alert('شما دسترسی به این صفحه را ندارید!');
                window.location.replace('index.html');
                return;
            }

            // 📌 استخراج و نمایش هوشمند نام کاربری ادمین
            let displayUsername = "";
            if (user.user_metadata && user.user_metadata.username) {
                displayUsername = user.user_metadata.username;
            } else {
                displayUsername = user.email.split('@')[0];
            }
            
            // تزریق نام ادمین و سپس ظاهر کردن کل هدر به صورت یکپارچه
            document.getElementById('admin-username').innerText = displayUsername;
            if (authUserContainer) authUserContainer.style.display = 'inline-flex';

        } catch (err) {
            console.error("خطا در بررسی سطح دسترسی:", err.message);
            window.location.replace('index.html');
        }
    }

    // اجرای خودکار لایه امنیتی به محض بالا آمدن صفحه ادمین
    window.onload = checkAdminAccess;
    // اجرای خودکار لایه امنیتی به محض بالا آمدن صفحه ادمین
    window.onload = checkAdminAccess;

    // 📌 تابع اختصاصی خروج ادمین (درخواست شما)
    async function logoutAdmin() {
        try {
            // ۱. خروج رسمی از نشست سوپابیس
            await client.auth.signOut();
            
            // ۲. هدایت مستقیم و پاک به صفحه اصلی بدون امکان بازگشت (با replace)
            // استفاده از replace باعث میشه دکمه Back مرورگر دیگر او را به صفحه ادمین برنگرداند
            window.location.replace('index.html');
        } catch (error) {
            console.error("خطا در هنگام خروج:", error.message);
            window.location.href = 'index.html';
        }
    }

    // تابع قبلی شما برای ارسال شعر (بدون تغییر)
    async function sendQuote() {
        let text = document.getElementById('quoteText').value.trim();
        let source = document.getElementById('quoteSource').value.trim();
        let genre = document.getElementById('quoteGenre').value;
        let info = document.getElementById('quoteInfo').value.trim() || "توضیحات و تفسیری برای این اثر ثبت نشده است.";
        let link = document.getElementById('quoteLink').value.trim() || "https://ganjoor.net";

        if(!text || !source) {
            alert('لطفاً متن شعر و نام شاعر را وارد کنید.');
            return;
        }

        try {
            const { data, error } = await client
                .from('quotes')
                .insert([{ 
                    text: text, 
                    source: source, 
                    genre: genre, 
                    info: info, 
                    link: link 
                }]);

            if (error) {
                alert('خطا از سمت سرور سوپابیس: ' + error.message);
                return;
            }

            alert('با موفقیت در سرور ابری ذخیره شد! 🎉');
            
            document.getElementById('quoteText').value = '';
            document.getElementById('quoteInfo').value = '';
            document.getElementById('quoteLink').value = '';
            document.getElementById('quoteSource').value = '';
            
        } catch (error) {
            alert('خطای داخلی مرورگر: ' + error.message);
        }
    }
</script>
</body>
</html>
