<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت ابری | گنجینه شاهکارها</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            display: block !important;
            overflow-y: auto !important;
            padding: 20px 10px !important;
            min-height: 100vh;
            box-sizing: border-box;
            background-color: #030710 !important;
        }

        .tabs-container {
            display: flex !important;
            width: 95% !important;
            max-width: 600px !important;
            margin: 0 auto !important;
            background: transparent !important;
            padding: 0 !important;
            padding-right: 40px !important;
            gap: 6px !important;
            position: relative !important;
            top: 2px !important;
            z-index: 10 !important;
        }

        .chrome-tab {
            background: #0b1426 !important;
            color: #cbd5e0 !important;
            padding: 10px 22px !important;
            border-radius: 12px 12px 0 0 !important;
            border: 1px solid rgba(212, 175, 55, 0.3) !important;
            border-bottom: none !important;
            cursor: pointer !important;
            font-family: "B Nazanin", "Tanha", sans-serif !important;
            font-size: 1.05rem !important;
            transition: all 0.2s ease !important;
            display: flex !important;
            align-items: center !important;
            gap: 8px !important;
        }

        .chrome-tab:hover {
            background: #111f38 !important;
            color: #fff !important;
        }

        .chrome-tab.active-tab {
            background: #070f1e !important;
            color: #d4af37 !important;
            border: 2px solid #d4af37 !important;
            border-bottom: 2px solid #070f1e !important;
            font-weight: bold !important;
            position: relative !important;
            z-index: 20 !important;
            margin-bottom: -2px !important;
        }

        .admin-form {
            background-color: #070f1e !important;
            padding: 30px !important;
            border: 2px solid #d4af37 !important;
            border-radius: 20px !important;
            width: 95% !important;
            max-width: 600px !important;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5) !important;
            font-family: "B Nazanin", "Tanha", sans-serif !important;
            margin: 0 auto 40px auto !important;
            position: relative !important;
            z-index: 15 !important;
            box-sizing: border-box !important;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .form-group label {
            display: block;
            color: #cbd5e0;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            background-color: #030710;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 10px;
            color: #fff;
            font-family: inherit;
            font-size: 1.05rem;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #d4af37;
            outline: none;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .audio-section {
            background: rgba(212, 175, 55, 0.03);
            border: 1px dashed rgba(212, 175, 55, 0.3);
            padding: 18px;
            border-radius: 12px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .suggestion-card {
            background: #030710;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: right;
        }

        .suggestion-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
            padding-top: 12px;
        }

        .custom-alert {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #070f1e;
            color: #cbd5e0;
            border: 1px solid #d4af37;
            padding: 14px 28px;
            border-radius: 12px;
            font-family: "B Nazanin", "Tanha", sans-serif;
            font-size: 1.1rem;
            z-index: 9999;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            direction: rtl;
            text-align: center;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
            min-width: 250px;
        }

        .custom-alert.show {
            top: 30px;
            opacity: 1;
        }

        .btn-transfer {
            background: #102a45;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-transfer:hover {
            background: #d4af37;
            color: #030710;
        }

        .btn-reject {
            background: #2a0a0a;
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-reject:hover {
            background: #ff6b6b;
            color: #030710;
        }

        .btn-delete-suggestion {
            background: #611a1a;
            color: #ffebeb;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-delete-suggestion:hover {
            background: #ff4757;
            color: #fff;
        }
    </style>
</head>

<body>

    <div id="custom-alert" class="custom-alert"></div>

    <div
        style="margin-top: 15px; margin-bottom: 20px; width: 100%; padding: 0 20px; box-sizing: border-box; display: flex; justify-content: flex-start; align-items: center; direction: rtl;">
        <div id="auth-user" style="display: none; align-items: center; margin-right: auto;">
            <span id="admin-username" style="color: #cbd5e0; margin-left: 10px; font-size: 1.05rem;"></span>
            <button class="btn btn-secondary style-mini" onclick="logoutAdmin()"
                style="margin: 0 !important;">خروج</button>
        </div>
    </div>

    <div class="tabs-container" style="direction: rtl;">
        <div id="tab-insert" class="chrome-tab active-tab" onclick="switchTab('insert')">ثبت اثر جدید</div>
        <div id="tab-review" class="chrome-tab" onclick="switchTab('review')">بررسی پیشنهادها</div>
        <div id="tab-manage" class="chrome-tab" onclick="switchTab('manage')">لیست آثار ثبت شده</div>
    </div>

    <div id="content-insert" class="admin-form">
        <h2 style="color: #d4af37; text-align: center; margin-top: 0; margin-bottom: 25px;">افزودن شاهکار ادبی جدید</h2>

        <div class="form-group">
            <label for="quoteText">متن شعر یا کتاب :</label>
            <textarea id="quoteText" rows="4" placeholder="متن اثر را اینجا بنویسید..." dir="rtl"></textarea>
        </div>

        <div class="form-group">
            <label for="quoteSource">نام شاعر یا نویسنده:</label>
            <input type="text" id="quoteSource" placeholder="مثال: حافظ شیرازی">
        </div>

        <div class="form-group">
            <label for="quoteGenre">دسته‌بندی موضوعی:</label>
            <select id="quoteGenre">
                <option value="عاشقانه">عاشقانه</option>
                <option value="عرفانی">عرفانی</option>
                <option value="فلسفی">فلسفی</option>
                <option value="حکمت">پند و حکمت</option>
                <option value="اجتماعی">اجتماعی</option>
                <option value="طنز">طنز و انتقادی</option>
                <option value="مذهبی">مذهبی</option>
                <option value="ادبیات جهان">ادبیات جهان</option>
                <option value="حماسی">حماسی</option>
                <option value="دفاع مقدس">دفاع مقدس</option>
            </select>
        </div>

        <div class="form-group">
            <label for="quoteInfo">درباره اثر:</label>
            <textarea id="quoteInfo" rows="3" placeholder="توضیحاتی درباره این بیت یا سخن..."></textarea>
        </div>

        <div class="form-group">
            <label for="quoteLink">لینک منبع:</label>
            <input type="url" id="quoteLink" placeholder="https://ganjoor.net/..."
                style="text-align: left; direction: ltr;">
        </div>

        <div class="audio-section">
            <h4 style="color: #d4af37; margin-top: 0; margin-bottom: 12px; font-size: 1.05rem;">تنظیمات فایل صوتی </h4>

            <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
                <label for="quoteHasAudio" style="margin-bottom: 0; cursor: pointer;">این اثر دارای فایل صوتی
                    است؟</label>
                <select id="quoteHasAudio" style="width: auto; padding: 6px 12px; margin-right: auto;"
                    onchange="toggleAudioInputs()">
                    <option value="false">خیر</option>
                    <option value="true">بله</option>
                </select>
            </div>

            <div id="audio-fields" style="display: none;">
                <div class="form-group">
                    <label for="quoteAudioName">نام اهنگ :</label>
                    <input type="text" id="quoteAudioName" placeholder="مثال: تصنیف مرغ سحر یا دکلمه هوشنگ ابتهاج">
                </div>

                <div class="form-group">
                    <label for="quoteSinger">نام خواننده :</label>
                    <input type="text" id="quoteSinger" placeholder="مثال: استاد محمدرضا شجریان">
                </div>

                <div class="form-group" style="margin-bottom: 0;">
                    <label for="quoteAudioUrl">لینک فایل صوتی :</label>
                    <input type="url" id="quoteAudioUrl" placeholder="https://site.com/music.mp3"
                        style="text-align: left; direction: ltr;">
                </div>


                <div class="form-group">
                    <label>متن کامل شعر : </label>
                    <textarea id="quoteFullLyrics" rows="6"
                        placeholder="متن کامل یا ابیات طولانی را در این بخش وارد کنید..."></textarea>
                </div>
            </div>
        </div>

        <button class="btn" onclick="sendQuote()"
            style="width: 100%; padding: 12px; font-size: 1.1rem; margin-top: 10px;">ذخیره در پایگاه داده</button>
    </div>

    <div id="content-review" class="admin-form" style="display: none;">
        <h2 style="color: #d4af37; text-align: center; margin-top: 0; margin-bottom: 25px;">پیشنهادات کاربران</h2>
        <div id="suggestions-list">
            <p style="text-align: center; color: #cbd5e0;">در حال دریافت اطلاعات...</p>
        </div>
    </div>

    <div id="content-manage" class="admin-form" style="display: none; max-width: 800px !important;">
        <h2 style="color: #d4af37; text-align: center; margin-top: 0; margin-bottom: 25px;">لیست کل آثار ثبت شده</h2>

        <div class="form-group" style="margin-bottom: 25px;">
            <input type="text" id="searchQuotes" placeholder="جستجو در متن اثر یا نام شاعر..." oninput="filterQuotes()"
                style="width: 100%;">
        </div>

        <div id="quotes-list">
            <p style="text-align: center; color: #cbd5e0;">در حال دریافت اطلاعات اشعار...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://shnuggkkwvyixdmlnugl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Lih64HUZIiKkxniY28yOPA_NL7Hz7km';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allQuotesCache = [];
        let editingQuoteId = null;
        let currentSuggestionCard = null;

        function showMessage(msg) {
            const alertBox = document.getElementById('custom-alert');
            alertBox.innerText = msg;
            alertBox.classList.add('show');
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 3500);
        }

        function toggleAudioInputs() {
            const hasAudio = document.getElementById('quoteHasAudio').value === 'true';
            document.getElementById('audio-fields').style.display = hasAudio ? 'block' : 'none';
        }

        async function checkAdminAccess() {
            try {
                const authUserContainer = document.getElementById('auth-user');
                if (authUserContainer) authUserContainer.style.display = 'none';

                const { data: { user }, error: userError } = await client.auth.getUser();
                if (userError || !user) { window.location.replace('index.html'); return; }

                const { data: profile, error: profileError } = await client
                    .from('profiles')
                    .select('role')
                    .eq('id', user.id)
                    .maybeSingle();

                if (profileError || !profile || profile.role !== 'admin') {
                    showMessage('شما دسترسی به این صفحه را ندارید!');
                    setTimeout(() => window.location.replace('index.html'), 2000);
                    return;
                }

                let displayUsername = user.user_metadata?.username || user.email.split('@')[0];
                document.getElementById('admin-username').innerText = displayUsername;
                if (authUserContainer) authUserContainer.style.display = 'inline-flex';

                loadSuggestions();

            } catch (err) {
                console.error(err);
                window.location.replace('index.html');
            }
        }

        window.onload = checkAdminAccess;

        function switchTab(tabName) {
            document.getElementById('tab-insert').classList.remove('active-tab');
            document.getElementById('tab-review').classList.remove('active-tab');
            document.getElementById('tab-manage').classList.remove('active-tab');

            document.getElementById('content-insert').style.display = 'none';
            document.getElementById('content-review').style.display = 'none';
            document.getElementById('content-manage').style.display = 'none';

            if (tabName === 'insert') {
                document.getElementById('tab-insert').classList.add('active-tab');
                document.getElementById('content-insert').style.display = 'block';
            } else if (tabName === 'review') {
                document.getElementById('tab-review').classList.add('active-tab');
                document.getElementById('content-review').style.display = 'block';
                loadSuggestions();
            } else if (tabName === 'manage') {
                document.getElementById('tab-manage').classList.add('active-tab');
                document.getElementById('content-manage').style.display = 'block';
                loadAllQuotes();
            }
        }

        async function logoutAdmin() {
            await client.auth.signOut();
            window.location.replace('index.html');
        }

        // ۱. تابع ثبت شاهکار جدید
        async function sendQuote() {
            let text = document.getElementById('quoteText').value.trim();
            let source = document.getElementById('quoteSource').value.trim();
            let genre = document.getElementById('quoteGenre').value;
            let info = document.getElementById('quoteInfo').value.trim();
            let link = document.getElementById('quoteLink').value.trim();

            let has_audio = document.getElementById('quoteHasAudio').value === 'true';
            let audio_name = has_audio ? document.getElementById('quoteAudioName').value.trim() : '';
            let singer = has_audio ? document.getElementById('quoteSinger').value.trim() : '';
            let audio_url = has_audio ? document.getElementById('quoteAudioUrl').value.trim() : '';
            let full_lyrics = has_audio ? document.getElementById('quoteFullLyrics').value.trim() : '';

            if (!text) { showMessage('لطفاً متن شعر یا اثر را وارد کنید.'); return; }
            if (!source) { showMessage('لطفاً نام شاعر یا نویسنده را وارد کنید.'); return; }
            if (!info) { showMessage('لطفاً بخش درباره اثر را وارد کنید.'); return; }
            if (!link) { showMessage('لطفاً لینک منبع اثر را وارد کنید.'); return; }

            if (has_audio) {
                if (!audio_name) { showMessage('لطفاً نام آهنگ یا دکلمه را وارد کنید.'); return; }
                if (!singer) { showMessage('لطفاً نام خواننده یا دکلماتور را وارد کنید.'); return; }
                if (!audio_url) { showMessage('لطفاً لینک مستقیم فایل صوتی را وارد کنید.'); return; }
                if (!full_lyrics) { showMessage('لطفاً متن کامل شعر را برای صفحه پخش وارد کنید.'); return; }
            }

            try {
                const { data, error } = await client
                    .from('quotes')
                    .insert([{ text, source, genre, info, link, has_audio, audio_name, singer, audio_url, full_lyrics }]);

                if (error) throw error;

                if (currentSuggestionCard && currentSuggestionCard.id) {
                    await client.from('admin_notifications').update({ is_read: true }).eq('id', currentSuggestionCard.id);
                }

                showMessage('با موفقیت در سرور ابری ثبت شد!');
                resetFormToInsertMode();
            } catch (err) {
                showMessage('خطا در ثبت اطلاعات: ' + err.message);
            }
        }

        // ۲. تابع اعمال تغییرات ویرایش شده در دیتابیس
        async function updateQuote() {
            let text = document.getElementById('quoteText').value.trim();
            let source = document.getElementById('quoteSource').value.trim();
            let genre = document.getElementById('quoteGenre').value;
            let info = document.getElementById('quoteInfo').value.trim();
            let link = document.getElementById('quoteLink').value.trim();

            let has_audio = document.getElementById('quoteHasAudio').value === 'true';
            let audio_name = has_audio ? document.getElementById('quoteAudioName').value.trim() : '';
            let singer = has_audio ? document.getElementById('quoteSinger').value.trim() : '';
            let audio_url = has_audio ? document.getElementById('quoteAudioUrl').value.trim() : '';
            let full_lyrics = has_audio ? document.getElementById('quoteFullLyrics').value.trim() : '';

            if (!text) { showMessage('لطفاً متن شعر یا اثر را وارد کنید.'); return; }
            if (!source) { showMessage('لطفاً نام شاعر یا نویسنده را وارد کنید.'); return; }
            if (!info) { showMessage('لطفاً بخش «درباره اثر» را وارد کنید.'); return; }
            if (!link) { showMessage('لطفاً لینک منبع اثر را وارد کنید.'); return; }

            if (has_audio) {
                if (!audio_name) { showMessage('لطفاً نام آهنگ یا دکلمه را وارد کنید.'); return; }
                if (!singer) { showMessage('لطفاً نام خواننده یا دکلماتور را وارد کنید.'); return; }
                if (!audio_url) { showMessage('لطفاً لینک مستقیم فایل صوتی را وارد کنید.'); return; }
                if (!full_lyrics) { showMessage('لطفاً متن کامل شعر را برای صفحه پخش وارد کنید.'); return; }
            }

            try {
                const { error } = await client
                    .from('quotes')
                    .update({ text, source, genre, info, link, has_audio, audio_name, singer, audio_url, full_lyrics })
                    .eq('id', editingQuoteId);

                if (error) throw error;

                showMessage('تغییرات اثر با موفقیت اعمال شد!');
                resetFormToInsertMode();
                switchTab('manage');
            } catch (err) {
                showMessage('خطا در بروزرسانی: ' + err.message);
            }
        }

        async function loadSuggestions() {
            try {
                const { data, error } = await client
                    .from('admin_notifications')
                    .select('*')
                    .eq('is_read', false)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('suggestions-list');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: #cbd5e0; margin: 20px 0;">هیچ پیشنهاد جدیدی ندارید.</p>';
                    return;
                }

                container.innerHTML = '';
                data.forEach(sugg => {
                    const card = document.createElement('div');
                    card.className = 'suggestion-card';

                    const cleanText = (sugg.text || '').replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/'/g, "\\'").replace(/"/g, '\\"');
                    const cleanSource = (sugg.source || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');
                    const cleanGenre = (sugg.genre || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"');

                    card.innerHTML = `
                        <p style="color: #f1ebd9; font-size: 1.1rem; line-height: 1.6; white-space: pre-line;">${sugg.text || ''}</p>
                        <div style="color: #cbd5e0; font-size: 0.95rem; margin-top: 8px;">
                            نویسنده پیشنهادی کاربر : <strong style="color: #d4af37;">${sugg.source || 'نامشخص'}</strong> | دسته‌بندی: <span style="color: #4ecdc4;">${sugg.genre || 'نامشخص'}</span>
                        </div>
                        <div class="suggestion-actions">
                            <button class="btn-transfer" onclick="sendToInsertForm('${sugg.id}', '${cleanText}', '${cleanSource}', '${cleanGenre}')">بررسی و ویرایش</button>
                            <button class="btn-delete-suggestion" onclick="deleteNotification('${sugg.id}')">حذف</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('suggestions-list').innerHTML = `<p style="color: #ff6b6b; text-align: center;">خطا در بارگذاری پیشنهادات: ${err.message}</p>`;
            }
        }

        async function sendToInsertForm(id, text, source, genre) {
            currentSuggestionCard = { id, text, source, genre };
            editingQuoteId = null;

            document.getElementById('quoteText').value = text;
            document.getElementById('quoteSource').value = source;
            document.getElementById('quoteGenre').value = genre || 'عاشقانه';
            document.getElementById('quoteInfo').value = '';
            document.getElementById('quoteLink').value = '';

            document.getElementById('quoteHasAudio').value = "false";
            toggleAudioInputs();

            const submitBtn = document.querySelector("#content-insert .btn");
            if (submitBtn) {
                submitBtn.innerText = "تایید و ذخیره پیشنهاد";
                submitBtn.setAttribute("onclick", "sendQuote()");
                submitBtn.style.width = "calc(50% - 6px)";
                submitBtn.style.display = "inline-block";
                submitBtn.style.float = "right";
                submitBtn.style.boxSizing = "border-box";
            }

            const oldCancelBtn = document.getElementById('inlineCancelBtn');
            if (oldCancelBtn) oldCancelBtn.remove();
            const oldClearfix = document.getElementById('btnClearfix');
            if (oldClearfix) oldClearfix.remove();

            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'inlineCancelBtn';
            cancelBtn.innerText = 'انصراف و بازگشت';
            cancelBtn.style.cssText = `
                width: calc(50% - 6px); display: inline-block; float: left; padding: 12px;
                font-size: 1.1rem; margin-top: 10px; background: #bd3a3a; color: white;
                border: none; border-radius: 50px; cursor: pointer; font-family: inherit;
                font-weight: bold; box-sizing: border-box;
            `;

            cancelBtn.onclick = function () {
                resetFormToInsertMode();
                switchTab('review');
                showMessage('بررسی پیشنهاد کاربر لغو شد.');
            };

            const clearfix = document.createElement('div');
            clearfix.id = 'btnClearfix';
            clearfix.style.cssText = "clear: both; display: block; height: 1px;";

            submitBtn.parentNode.insertBefore(cancelBtn, submitBtn.nextSibling);
            submitBtn.parentNode.insertBefore(clearfix, cancelBtn.nextSibling);

            switchTab('insert');
            document.getElementById('quoteInfo').focus();
            showMessage('متن پیشنهادی به فرم انتقال یافت.');
        }

        async function deleteNotification(id) {
            showConfirmMessage(
                'آیا از حذف این پیشنهاد مطمئن هستید؟',
                async function () {
                    try {
                        const { error } = await client
                            .from('admin_notifications')
                            .update({ is_read: true })
                            .eq('id', id);

                        if (error) throw error;
                        showMessage('پیشنهاد با موفقیت حذف شد.');
                        loadSuggestions();
                    } catch (err) {
                        showMessage('خطا: ' + err.message);
                    }
                },
                function () {
                    showMessage('عملیات حذف لغو شد.');
                }
            );
        }

        function showConfirmMessage(message, onConfirm, onCancel) {
            const oldConfirm = document.querySelector('.custom-confirm-overlay');
            if (oldConfirm) oldConfirm.remove();

            const overlay = document.createElement('div');
            overlay.className = 'custom-confirm-overlay';
            overlay.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.7); z-index: 99999;
                display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px);
            `;

            const box = document.createElement('div');
            box.className = 'custom-confirm';
            box.style.cssText = `
                background: linear-gradient(135deg, #070f1e, #0a1628);
                border: 2px solid #d4af37; border-radius: 20px; padding: 30px 35px;
                max-width: 400px; width: 90%; text-align: center;
                box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9); animation: confirmSlideIn 0.4s ease forwards; direction: rtl;
            `;

            box.innerHTML = `
                <div style="color: #ff4757; font-size: 2.5rem; margin-bottom: 8px; line-height: 1;">⚠</div>
                <p style="color: #f1ebd9; font-size: 1.1rem; margin-bottom: 25px; font-family: 'B Nazanin', 'Tanha', sans-serif; line-height: 1.6;">${message}</p>
                <div style="display: flex; gap: 12px; justify-content: center;">
                    <button class="btn id-confirm" style="flex: 1; padding: 10px 20px; font-size: 1.05rem;">بله، مطمئنم</button>
                    <button class="btn btn-secondary id-cancel" style="flex: 1; padding: 10px 20px; font-size: 1.05rem;">انصراف</button>
                </div>
            `;

            overlay.appendChild(box);
            document.body.appendChild(overlay);

            overlay.querySelector('.id-confirm').onclick = function () { overlay.remove(); if (typeof onConfirm === 'function') onConfirm(); };
            overlay.querySelector('.id-cancel').onclick = function () { overlay.remove(); if (typeof onCancel === 'function') onCancel(); };
        }

        const confirmStyle = document.createElement('style');
        confirmStyle.textContent = `@keyframes confirmSlideIn { 0% { opacity: 0; transform: scale(0.9) translateY(-20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }`;
        document.head.appendChild(confirmStyle);

        async function loadAllQuotes() {
            try {
                const container = document.getElementById('quotes-list');
                container.innerHTML = '<p style="text-align: center; color: #cbd5e0;">در حال بارگذاری آثار...</p>';

                const { data, error } = await client
                    .from('quotes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allQuotesCache = data;
                renderQuotesList(allQuotesCache);
            } catch (err) {
                document.getElementById('quotes-list').innerHTML = `<p style="color: #ff6b6b; text-align: center;">خطا در دریافت اشعار: ${err.message}</p>`;
            }
        }

        function renderQuotesList(quotesArray) {
            const container = document.getElementById('quotes-list');
            if (!quotesArray || quotesArray.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #cbd5e0; margin: 20px 0;">هیچ اثری یافت نشد.</p>';
                return;
            }

            container.innerHTML = '';
            quotesArray.forEach(quote => {
                const card = document.createElement('div');
                card.className = 'suggestion-card';
                card.style.borderLeft = '4px solid #d4af37';

                const escText = quote.text ? quote.text.replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/`/g, '\\`').replace(/\$/g, '\\$') : '';
                const escInfo = quote.info ? quote.info.replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/`/g, '\\`').replace(/\$/g, '\\$') : '';
                const escSource = quote.source ? quote.source.replace(/'/g, "\\'") : '';
                const escAudioName = quote.audio_name ? quote.audio_name.replace(/'/g, "\\'") : '';
                const escSinger = quote.singer ? quote.singer.replace(/'/g, "\\'") : '';
                const escAudioUrl = quote.audio_url ? quote.audio_url.replace(/'/g, "\\'") : '';
                const escFullLyrics = quote.full_lyrics ? quote.full_lyrics.replace(/\\/g, '\\\\').replace(/\n/g, '\\n').replace(/`/g, '\\`').replace(/\$/g, '\\$') : '';

                const audioBadge = quote.has_audio ? `<span style="background: #0a2a1a; color: #4ecdc4; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-right: 10px;">🎵 ${quote.audio_name || 'آهنگ'} (${quote.singer})</span>` : '';

                card.innerHTML = `
                    <p style="color: #f1ebd9; font-size: 1.1rem; line-height: 1.6; white-space: pre-line;">${quote.text}</p>
                    <div style="color: #cbd5e0; font-size: 0.95rem; margin-top: 8px; display: flex; justify-content: space-between; direction: rtl; align-items: center;">
                        <div>
                            <span>شاعر / نویسنده : <strong style="color: #d4af37;">${quote.source}</strong></span>
                            ${audioBadge}
                        </div>
                        <span>دسته‌بندی: <em style="color: #cbd5e0;">${quote.genre}</em></span>
                    </div>
                    <div class="suggestion-actions" style="margin-top: 15px;">
                        <button class="btn-transfer" onclick="editQuoteInForm('${quote.id}', \`${escText}\`, '${escSource}', '${quote.genre}', \`${escInfo}\`, '${quote.link}', ${quote.has_audio}, \`${escAudioName}\`, '${escSinger}', '${escAudioUrl}', \`${escFullLyrics}\`)"> ویرایش اثر</button>
                        <button class="btn-reject" onclick="deleteQuote('${quote.id}')"> حذف قطعی</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterQuotes() {
            const query = document.getElementById('searchQuotes').value.toLowerCase().trim();
            if (!query) {
                renderQuotesList(allQuotesCache);
                return;
            }
            const filtered = allQuotesCache.filter(q =>
                (q.text && q.text.toLowerCase().includes(query)) ||
                (q.source && q.source.toLowerCase().includes(query))
            );
            renderQuotesList(filtered);
        }

        async function deleteQuote(id) {
            showConfirmMessage(
                'آیا از حذف کاملا قطعی این شاهکار ادبی از سرور ابری مطمئن هستید؟ (این عملیات غیرقابل بازگشت است)',
                async function () {
                    try {
                        const { error } = await client
                            .from('quotes')
                            .delete()
                            .eq('id', id);

                        if (error) throw error;
                        showMessage('اثر با موفقیت از دیتابیس حذف شد.');
                        loadAllQuotes();
                    } catch (err) {
                        showMessage('خطا در حذف: ' + err.message);
                    }
                },
                function () {
                    showMessage('عملیات حذف لغو شد.');
                }
            );
        }

        // ۳. تابع کاملاً اصلاح شده برای باز کردن اطلاعات قدیمی در فرم ویرایش
        function editQuoteInForm(id, text, source, genre, info, link, hasAudio, audioName, singer, audioUrl, fullLyrics) {
            editingQuoteId = id;
            currentSuggestionCard = null;

            document.getElementById('quoteText').value = text;
            document.getElementById('quoteSource').value = source;
            document.getElementById('quoteGenre').value = genre;
            document.getElementById('quoteInfo').value = info;
            document.getElementById('quoteLink').value = link;

            document.getElementById('quoteHasAudio').value = hasAudio ? "true" : "false";
            toggleAudioInputs();

            if (hasAudio) {
                document.getElementById('quoteAudioName').value = audioName || '';
                document.getElementById('quoteSinger').value = singer || '';
                document.getElementById('quoteAudioUrl').value = audioUrl || '';
                document.getElementById('quoteFullLyrics').value = fullLyrics || '';
            } else {
                document.getElementById('quoteAudioName').value = '';
                document.getElementById('quoteSinger').value = '';
                document.getElementById('quoteAudioUrl').value = '';
                document.getElementById('quoteFullLyrics').value = '';
            }

            const headerTitle = document.querySelector("#content-insert h2");
            if (headerTitle) headerTitle.innerText = "ویرایش و بروزرسانی شاهکار ادبی";

            const submitBtn = document.querySelector("#content-insert .btn");
            if (submitBtn) {
                submitBtn.innerText = "اعمال تغییرات";
                submitBtn.setAttribute("onclick", "updateQuote()");
                submitBtn.style.width = "calc(50% - 6px)";
                submitBtn.style.display = "inline-block";
                submitBtn.style.float = "right";
                submitBtn.style.boxSizing = "border-box";
            }

            const oldCancelBtn = document.getElementById('inlineCancelBtn');
            if (oldCancelBtn) oldCancelBtn.remove();
            const oldClearfix = document.getElementById('btnClearfix');
            if (oldClearfix) oldClearfix.remove();

            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'inlineCancelBtn';
            cancelBtn.innerText = 'انصراف از ویرایش';
            cancelBtn.style.cssText = `
                width: calc(50% - 6px); display: inline-block; float: left; padding: 12px;
                font-size: 1.1rem; margin-top: 10px; background: #bd3a3a; color: white;
                border: none; border-radius: 50px; cursor: pointer; font-family: inherit;
                font-weight: bold; box-sizing: border-box;
            `;

            cancelBtn.onclick = function () {
                resetFormToInsertMode();
                switchTab('manage');
                showMessage('ویرایش اثر لغو شد.');
            };

            const clearfix = document.createElement('div');
            clearfix.id = 'btnClearfix';
            clearfix.style.cssText = "clear: both; display: block; height: 1px;";

            submitBtn.parentNode.insertBefore(cancelBtn, submitBtn.nextSibling);
            submitBtn.parentNode.insertBefore(clearfix, cancelBtn.nextSibling);

            switchTab('insert');
            document.getElementById('quoteText').focus();
            showMessage('اطلاعات اثر برای ویرایش بارگذاری شد.');
        }

        function resetFormToInsertMode() {
            editingQuoteId = null;
            currentSuggestionCard = null;

            document.getElementById('quoteText').value = '';
            document.getElementById('quoteSource').value = '';
            document.getElementById('quoteGenre').value = 'عاشقانه';
            document.getElementById('quoteInfo').value = '';
            document.getElementById('quoteLink').value = '';

            document.getElementById('quoteHasAudio').value = 'false';
            document.getElementById('quoteAudioName').value = '';
            document.getElementById('quoteSinger').value = '';
            document.getElementById('quoteAudioUrl').value = '';
            document.getElementById('quoteFullLyrics').value = '';
            toggleAudioInputs();

            const headerTitle = document.querySelector("#content-insert h2");
            if (headerTitle) headerTitle.innerText = "افزودن شاهکار ادبی جدید";

            const submitBtn = document.querySelector("#content-insert .btn");
            if (submitBtn) {
                submitBtn.innerText = "ذخیره در سرور ابری";
                submitBtn.setAttribute("onclick", "sendQuote()");
                submitBtn.style.width = "100%";
                submitBtn.style.display = "block";
                submitBtn.style.float = "none";
            }

            const cancelBtn = document.getElementById('inlineCancelBtn');
            if (cancelBtn) cancelBtn.remove();
            const clearfix = document.getElementById('btnClearfix');
            if (clearfix) clearfix.remove();
        }
    </script>
</body>

</html>
