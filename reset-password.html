<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجوای قلم | تغییر رمز عبور</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* خنثی کردن پوزیشن کجِ فایل style.css برای آیکون چشم */
        .password-wrapper div[id^="toggle-password-container"] {
            top: 50% !important;
            transform: translateY(-50%) !important;
            left: 12px !important;
        }

        /* استایل اختصاصی برای کادر ورود رمز این صفحه */
        #new-password {
            text-align: left !important;
            direction: ltr !important;
            padding-left: 45px !important; /* ایجاد فضای کافی در سمت چپ برای آیکون چشم */
            padding-right: 15px !important;
        }

        /* 📌 کدهای جدید برای شبیه‌سازی کامل کادر ورود/ثبت‌نام صفحه اصلی */
        body {
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
            min-height: 100vh !important;
            padding: 20px !important;
            box-sizing: border-box !important;
        }
        .quote-card {
            max-width: 400px !important; /* محدود کردن عرض کادر به اندازه کادر ورود */
            width: 100% !important;
            margin-top: 20px !important;
        }
    </style>
</head>

<body>

    <div class="site-name">
        گنجینه پارسی
    </div>

    <div class="quote-card animate-fade" style="margin-top: 40px; min-height: auto; padding: 40px 25px;">
        <div class="quote-text" style="font-size: 1.5rem; margin-bottom: 20px; color: #d4af37;">
            تغییر رمز عبور حساب کاربری
        </div>
        
        <p style="color: #cbd5e0; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.6;">
            لطفاً رمز عبور جدید خود را وارد نمایید. رمز عبور باید حداقل شامل ۶ کاراکتر باشد.
        </p>

        <div style="max-width: 320px; margin: 0 auto 20px auto;">
            <div class="password-wrapper" style="margin-bottom: 15px;">
               <input type="password" id="new-password" placeholder="رمز عبور جدید (حداقل ۶ کاراکتر)">
                <div id="toggle-password-container-signup">
                    <img id="signup-eye-img" class="toggle-eye-btn" src="Icons8/icons8-eye-48.png"
                        onclick="togglePasswordVisibility('new-password', 'signup-eye-img')" alt="نمایش رمز">
                </div>
            </div>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; max-width: 320px; margin: 0 auto;">
            <button class="btn" onclick="updatePassword()">ثبت رمز جدید</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">انصراف</button>
        </div>
    </div>

    <script src="reset-password.js"></script>
    <script>
        // اضافه کردن تابع چشم برای این صفحه جهت یکپارچگی بیشتر
        function togglePasswordVisibility(inputId, imgId) {
            const passwordInput = document.getElementById(inputId);
            const eyeImage = document.getElementById(imgId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeImage.src = 'Icons8/icons8-eye-48.png';
            } else {
                passwordInput.type = 'password';
                eyeImage.src = 'Icons8/icons8-eye-48 (1).png';
            }
        }
    </script>
</body>

</html>
