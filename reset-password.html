<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نجوای قلم | تغییر رمز عبور</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="site-name">
        گنجینه پارسی
    </div>

    <div class="card" style="max-width: 400px; width: 90%; padding: 40px 30px; margin: 60px auto; box-sizing: border-box;">
        <div class="quote-text" style="font-size: 1.5rem; margin-bottom: 20px; color: #d4af37;">
            تغییر رمز عبور حساب کاربری
        </div>

        <p style="color: #cbd5e0; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.6;">
            لطفاً رمز عبور جدید خود را وارد نمایید. رمز عبور باید حداقل شامل ۶ کاراکتر باشد.
        </p>

        <div style="width:100%; margin:0 auto 20px auto;">
            <div class="password-wrapper" style="position: relative; width: 100%; margin-bottom: 15px;">
                <input type="password" id="new-password" placeholder="رمز عبور جدید (حداقل ۶ کاراکتر)"
                    style="width: 100%; padding: 12px 15px 12px 45px; background-color: #030710; border: 2px solid #d4af37; border-radius: 8px; color: #f1ebd9; box-sizing: border-box; font-family: Tanha; text-align: right; direction: rtl;">
                <img id="signup-eye-img" class="toggle-eye-btn" src="Icons8/icons8-eye-48.png"
                    style="width: 20px; height: 20px; cursor: pointer;"
                    onclick="togglePasswordVisibility('new-password', 'signup-eye-img')" alt="نمایش رمز">
            </div>
        </div>
    </div>

    <div
        style="display: flex; gap: 12px; justify-content: center; margin-top: 30px; width: 100%; box-sizing: border-box;">
        <button class="btn" style="flex: 1; padding: 10px 15px; font-size: 1.05rem; border-radius: 25px;"
            onclick="updatePassword()">ثبت رمز جدید</button>
        <button class="btn btn-secondary" style="flex: 1; padding: 10px 15px; font-size: 1.05rem; border-radius: 25px;"
            onclick="window.location.href='index.html'">انصراف</button>
    </div>
    </div>

    <script src="reset-password.js"></script>
    <script>
        // اضافه کردن تابع چشم برای این صفحه جهت یکپارچگی بیشتر
        function togglePasswordVisibility(inputId, imgId) {
            const passwordInput = document.getElementById(inputId);
            const eyeImage = document.getElementById(imgId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeImage.src = 'Icons8/icons8-eye-48.png';
            } else {
                passwordInput.type = 'password';
                eyeImage.src = 'Icons8/icons8-eye-48 (1).png';
            }
        }
    </script>
</body>

</html>
