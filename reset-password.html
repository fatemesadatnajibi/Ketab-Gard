<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نغمه قلم | تغییر رمز عبور</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="reset-style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>



    <div class="reset-card">
        <div class="reset-title">
            تغییر رمز عبور حساب کاربری
        </div>

        <p class="reset-description">
            لطفاً رمز عبور جدید خود را وارد نمایید. رمز عبور باید حداقل شامل ۶ کاراکتر باشد.
        </p>

        <div class="reset-input-container">
            <div class="reset-password-wrapper">
                <input type="password" id="new-password" placeholder="رمز عبور جدید (حداقل ۶ کاراکتر)">
                <div class="reset-eye-container">
                    <img id="signup-eye-img" src="Icons8/icons8-eye-48.png"
                        onclick="togglePasswordVisibility('new-password', 'signup-eye-img')" alt="نمایش رمز">
                </div>
            </div>
        </div>

        <div class="reset-actions">
            <button class="btn" onclick="updatePassword()">ثبت رمز جدید</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">انصراف</button>
        </div>
    </div>

    <script src="reset-password.js"></script>
    <script>
        // تابع مدیریت نمایش یا پنهان‌سازی رمز عبور
        function togglePasswordVisibility(inputId, imgId) {
            const passwordInput = document.getElementById(inputId);
            const eyeImage = document.getElementById(imgId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeImage.src = 'Icons8/icons8-eye-48.png';
            } else {
                passwordInput.type = 'password';
                eyeImage.src = 'Icons8/icons8-eye-48 (1).png';
            }
        }
    </script>
</body>

</html>
