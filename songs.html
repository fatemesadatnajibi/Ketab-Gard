<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آوا و نوا | نغمه قلم</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* استایل‌های اختصاصی صفحه موسیقی در هماهنگی با تم اصلی سایت */
        .music-container {
            margin-top: 130px;
            width: 90%;
            max-width: 800px;
            background: rgba(7, 15, 30, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* بخش پلیر و کاور آلبوم */
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        .track-cover-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 15px;
        }

        .track-cover {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid #d4af37;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transition: transform 0.5s ease;
        }

        /* انیمیشن چرخش کاور هنگام پخش موسیقی */
        .rotating {
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        .track-title {
            font-size: 1.6rem;
            color: #f1ebd9;
            margin: 5px 0;
            font-weight: bold;
        }

        .track-artist {
            font-size: 1.1rem;
            color: #cbd5e0;
            margin-bottom: 20px;
        }

        /* دکمه‌های کنترلر موزیک مینی‌مال */
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .control-btn {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #f1ebd9;
            font-size: 1.5rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: #d4af37;
            color: #030710;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            transform: scale(1.05);
        }

        .play-main {
            width: 65px;
            height: 65px;
            font-size: 1.8rem;
            border-color: #d4af37;
            background: rgba(212, 175, 55, 0.1);
        }

        /* نوار زمان آهنگ */
        .progress-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #cbd5e0;
            font-size: 0.85rem;
        }

        .progress-bar {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #d4af37;
            cursor: pointer;
            box-shadow: 0 0 10px #d4af37;
        }

        /* باکس متن کامل شعر آهنگ */
        .lyrics-box {
            width: 100%;
            max-height: 300px;
            overflow-y: auto;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            padding-top: 25px;
            margin-top: 15px;
            font-size: 1.25rem;
            line-height: 2.2;
            color: #f1ebd9;
            white-space: pre-line;
        }

        /* دکمه بازگشت به صفحه اصلی */
        .back-home-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="luxury-islamic-header">
        <div class="gold-wave-stripes">
            <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
                <path d="M0,120 C320,180 480,40 800,130 C1120,220 1280,70 1440,110 L1440,0 L0,0 Z" fill="rgba(214, 175, 55, 0.4)"></path>
            </svg>
        </div>
    </div>

    <button class="btn btn-secondary back-home-btn" onclick="window.location.href='index.html'">↩ بازگشت به گنجینه</button>

    <div class="music-container">
        <div class="player-card">
            <div class="track-cover-wrapper">
                <img id="track-img" class="track-cover" src="Icons8/icons8-heart-50.png" alt="کاور اثر">
            </div>
            <div id="track-name" class="track-title">در حال بارگذاری...</div>
            <div id="track-singer" class="track-artist">نام خواننده</div>

            <div class="audio-controls">
                <button class="control-btn" onclick="playPreviousSong()">⏮</button>
                <button id="play-btn" class="control-btn play-main" onclick="toggleAudio()">▶</button>
                <button class="control-btn" onclick="playNextSong()">⏭</button>
            </div>

            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" class="progress-bar" value="0" min="0" max="100">
                <span id="duration-time">0:00</span>
            </div>
        </div>

        <div id="lyrics-content" class="lyrics-box">
            متن شعر صوتی در این بخش بارگذاری می‌شود...
        </div>
    </div>

    <script src="songs.js"></script>
</body>
</html>
